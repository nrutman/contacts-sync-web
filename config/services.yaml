# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
parameters:
    kernel.var_dir: "%kernel.project_dir%/var"

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $encryptionKey: "%env(APP_ENCRYPTION_KEY)%"
            $previousEncryptionKeys: "%env(default::APP_PREVIOUS_ENCRYPTION_KEYS)%"
            $varPath: "%kernel.var_dir%"

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: "../src/*"
        exclude: "../src/{DependencyInjection,Entity,Migrations,Tests,Kernel.php}"

    # These classes accept credentials via constructor but are only created
    # through their respective factories — exclude them from autowiring.
    App\Client\PlanningCenter\PlanningCenterClient:
        autowire: false
        autoconfigure: false

    App\Client\Google\GoogleClient:
        autowire: false
        autoconfigure: false

    App\Client\Mailchimp\MailchimpClient:
        autowire: false
        autoconfigure: false
